<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>SLIST — Investment Screening Platform</title>
    <meta name="description" content="Screen and rank equities across US, EU, German, and HK markets using 20 configurable growth and value criteria. Built for focused investment research teams." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://slist.eu/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://slist.eu/" />
    <meta property="og:title" content="Slist — Investment Screening Platform" />
    <meta property="og:description" content="Screen and rank equities across US, EU, German, and HK markets using 20 configurable growth and value criteria." />

    <meta property="og:site_name" content="Slist" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Slist — Investment Screening Platform" />
    <meta name="twitter:description" content="Screen and rank equities across US, EU, German, and HK markets using 20 configurable criteria." />
    <meta name="twitter:image" content="/icons.svg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "SLIST",
      "url": "https://slist.eu/",
      "description": "Screen and rank equities across US, EU, German, and HK markets using 20 configurable growth and value criteria.",
      "applicationCategory": "FinanceApplication"
    }

  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
